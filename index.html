<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Contact form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Main container with background -->
  <div class="page-container">
    
    <!-- Decorative background elements (hidden on mobile) -->
    <div class="decorative-bg" aria-hidden="true">
      
      <!-- Coral zigzag mountains - top left -->
      <svg class="deco-mountain-left" viewBox="0 0 160 110" fill="none">
        <path d="M2 105 L40 20 L70 70 L105 8 L158 105" stroke="currentColor" stroke-width="10" stroke-linejoin="round" stroke-linecap="round" />
      </svg>

      <!-- Coral zigzag mountains - top right -->
      <svg class="deco-mountain-right" viewBox="0 0 200 96" fill="none">
        <path d="M2 90 L55 18 L95 70 L140 14 L198 90" stroke="currentColor" stroke-width="9" stroke-linejoin="round" stroke-linecap="round" />
      </svg>

      <!-- Faint blue diagonal lines - left -->
      <svg class="deco-lines-left" viewBox="0 0 220 280" fill="none">
        <path d="M-20 280 L120 20" stroke="currentColor" stroke-width="7" stroke-linecap="round" />
        <path d="M40 280 L180 20" stroke="currentColor" stroke-width="7" stroke-linecap="round" />
      </svg>

      <!-- Faint blue diagonal lines - bottom right -->
      <svg class="deco-lines-right" viewBox="0 0 280 250" fill="none">
        <path d="M40 260 L200 40" stroke="currentColor" stroke-width="7" stroke-linecap="round" />
        <path d="M110 260 L270 40" stroke="currentColor" stroke-width="7" stroke-linecap="round" />
      </svg>

      <!-- Teal dot grid - bottom left -->
      <svg class="deco-dots" width="90" height="72" viewBox="0 0 90 72" fill="currentColor">
        <circle cx="6" cy="6" r="6" />
        <circle cx="24" cy="6" r="6" />
        <circle cx="42" cy="6" r="6" />
        <circle cx="60" cy="6" r="6" />
        <circle cx="78" cy="6" r="6" />
        <circle cx="6" cy="24" r="6" />
        <circle cx="24" cy="24" r="6" />
        <circle cx="42" cy="24" r="6" />
        <circle cx="60" cy="24" r="6" />
        <circle cx="78" cy="24" r="6" />
        <circle cx="6" cy="42" r="6" />
        <circle cx="24" cy="42" r="6" />
        <circle cx="42" cy="42" r="6" />
        <circle cx="60" cy="42" r="6" />
        <circle cx="78" cy="42" r="6" />
        <circle cx="6" cy="60" r="6" />
        <circle cx="24" cy="60" r="6" />
        <circle cx="42" cy="60" r="6" />
        <circle cx="60" cy="60" r="6" />
        <circle cx="78" cy="60" r="6" />
      </svg>
    </div>

    <!-- Mint panel background -->
    <div class="mint-panel" aria-hidden="true"></div>

    <!-- Success toast message (hidden by default) -->
    <div id="successToast" class="success-toast" role="status" aria-live="polite" aria-atomic="true" hidden>
      <div class="toast-content">
        <div class="toast-header">
          <!-- Success icon - checkmark in circle -->
          <img src="./assets/images/icon-success-check.svg" alt="" class="toast-icon" />
          <h2 class="toast-title">Message Sent!</h2>
        </div>
        <p class="toast-message">Thanks for completing the form. We'll be in touch soon!</p>
      </div>
    </div>

    <!-- Main form card -->
    <div class="form-card">
      <h1 class="form-heading">Contact Us</h1>

      <form id="contactForm" novalidate>
        
        <!-- First Name & Last Name Row -->
        <div class="form-row">
          
          <!-- First Name -->
          <div class="form-group">
            <label for="firstName" class="form-label">
              First Name <span class="required">*</span>
            </label>
            <input 
              type="text" 
              id="firstName" 
              name="firstName" 
              class="form-input"
            />
            <p id="firstName-error" class="error-message" role="alert"></p>
          </div>

          <!-- Last Name -->
          <div class="form-group">
            <label for="lastName" class="form-label">
              Last Name <span class="required">*</span>
            </label>
            <input 
              type="text" 
              id="lastName" 
              name="lastName" 
              class="form-input"
            />
            <p id="lastName-error" class="error-message" role="alert"></p>
          </div>

        </div>

        <!-- Email Address -->
        <div class="form-group">
          <label for="email" class="form-label">
            Email Address <span class="required">*</span>
          </label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input"
          />
          <p id="email-error" class="error-message" role="alert"></p>
        </div>

        <!-- Query Type Radio Buttons -->
        <fieldset class="form-group">
          <legend class="form-label">
            Query Type <span class="required">*</span>
          </legend>
          
          <div class="radio-group">
            
            <!-- General Enquiry -->
            <label class="radio-label">
              <input 
                type="radio" 
                name="queryType" 
                value="general" 
                class="radio-input"
              />
              <img src="./assets/images/icon-radio-selected.svg" alt="" class="radio-icon" />
              <span class="radio-text">General Enquiry</span>
            </label>

            <!-- Support Request -->
            <label class="radio-label">
              <input 
                type="radio" 
                name="queryType" 
                value="support" 
                class="radio-input"
              />
              <img src="./assets/images/icon-radio-selected.svg" alt="" class="radio-icon" />
              <span class="radio-text">Support Request</span>
            </label>

          </div>
          
          <p id="queryType-error" class="error-message" role="alert"></p>
        </fieldset>

        <!-- Message -->
        <div class="form-group">
          <label for="message" class="form-label">
            Message <span class="required">*</span>
          </label>
          <textarea 
            id="message" 
            name="message" 
            rows="4" 
            class="form-input form-textarea"
          ></textarea>
          <p id="message-error" class="error-message" role="alert"></p>
        </div>

        <!-- Consent Checkbox -->
        <div class="form-group checkbox-group">
          <label class="checkbox-label">
            <input 
              type="checkbox" 
              name="consent" 
              id="consent" 
              class="checkbox-input"
            />
            <img src="./assets/images/icon-checkbox-check.svg" alt="" class="checkbox-icon" />
            <span class="checkbox-text">
              I consent to being contacted by the team <span class="required">*</span>
            </span>
          </label>
          <p id="consent-error" class="error-message" role="alert"></p>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="btn-text">Submit</span>
          <!-- Loading spinner (hidden by default) -->
          <svg class="loading-spinner" viewBox="0 0 24 24" fill="none" hidden>
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity="0.25" />
            <path d="M12 2 A10 10 0 0 1 22 12" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
          </svg>
        </button>

      </form>
    </div>

  </div>

  <footer style="text-align: center; padding: 1rem; font-size: 0.75rem; color: var(--grey-900);">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" style="color: var(--green-600);">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/YozoraMoonlight" target="_blank" style="color: var(--green-600);">YozoraMoonlight</a>.
  </footer>

  <script src="script.js"></script>
</body>
</html>
